<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>マギア☆エトセトラ アーカイブ検索</title>
<meta name="description" content="「魔法少女まどか☆マギカ Magia Exedra」公式4コマ『マギア☆エトセトラ』を、登場キャラクターで検索できる非公式ファンツールです。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbe8ee;
    --bg-deep:#f2cddb;
    --surface:#fffbfc;
    --ink:#3a1f2e;
    --ink-muted:#9c7f89;
    --pink:#e0456b;
    --pink-deep:#b8285a;
    --gold:#c99a44;
    --gold-soft:#ecd6a6;
    --radius:18px;
    --shadow: 0 4px 14px rgba(58,31,46,.10);
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    min-height:100vh;
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 640px, var(--bg-deep) 100%);
    line-height:1.6;
  }
  a{ color:inherit; }
  img{ max-width:100%; }

  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  header{
    position:relative;
    overflow:hidden;
    padding:60px 24px 44px;
    text-align:center;
  }
  header::before, header::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(46px);
    opacity:.4;
    z-index:0;
  }
  header::before{ width:240px; height:240px; background:var(--pink); top:-100px; left:-70px; }
  header::after{ width:190px; height:190px; background:var(--gold); top:-50px; right:-50px; }

  header > *{ position:relative; z-index:1; }

  .eyebrow{
    font-size:.78rem;
    letter-spacing:.22em;
    color:var(--pink-deep);
    font-weight:700;
  }
  h1{
    font-family:'Shippori Mincho', serif;
    font-size:clamp(1.7rem, 4.4vw, 2.6rem);
    margin:.35em 0 .25em;
    font-weight:800;
    letter-spacing:.04em;
  }
  .sub{
    color:var(--ink-muted);
    font-size:.95rem;
    max-width:520px;
    margin:0 auto;
  }
  .official-link{
    display:inline-block;
    margin-top:16px;
    font-size:.8rem;
    color:var(--pink-deep);
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .official-link:hover{ color:var(--pink); }

  main{ max-width:1120px; margin:0 auto; padding:0 24px 80px; }

  .search-panel{
    position:relative;
    background:var(--surface);
    border-radius:24px;
    padding:26px 26px 22px;
    box-shadow:var(--shadow);
    margin-bottom:30px;
  }
  .search-box{ position:relative; margin-bottom:16px; }
  .search-icon{
    position:absolute;
    left:18px; top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    pointer-events:none;
  }
  .search-box input{
    width:100%;
    padding:13px 20px 13px 46px;
    border-radius:999px;
    border:2px solid var(--gold-soft);
    font-family:inherit;
    font-size:1rem;
    color:var(--ink);
    background:var(--bg);
  }
  .search-box input::placeholder{ color:var(--ink-muted); }
  .search-box input:focus{
    outline:none;
    border-color:var(--pink);
    box-shadow:0 0 0 4px rgba(224,69,123,.15);
  }
  .search-box input:focus-visible{ outline:3px solid var(--pink); outline-offset:2px; }

  .hint{
    margin:10px 2px 0;
    font-size:.76rem;
    color:var(--ink-muted);
  }
  .hint strong{ color:var(--pink-deep); }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:.82rem;
    font-weight:700;
    padding:7px 18px;
    border-radius:999px;
    border:1.5px solid var(--pink);
    background:var(--surface);
    color:var(--pink-deep);
    cursor:pointer;
    transition:background .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .chip:hover{ background:var(--bg); }
  .chip.active{
    background:var(--pink);
    color:#fff;
    box-shadow:0 0 0 3px var(--surface), 0 0 0 4.5px var(--pink);
  }
  .chip:focus-visible{ outline:3px solid var(--pink-deep); outline-offset:2px; }

  .result-count{ margin:0 6px 18px; font-size:.85rem; color:var(--ink-muted); }
  .result-count strong{ color:var(--pink-deep); font-size:1rem; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
    gap:22px;
  }
  .card{
    display:block;
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    text-decoration:none;
    color:inherit;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-5px);
    box-shadow:0 14px 26px rgba(58,31,46,.18);
  }
  .card:focus-visible{ outline:3px solid var(--pink); outline-offset:2px; }

  .thumb-wrap{ position:relative; background:var(--bg-deep); }
  .thumb-wrap img{ width:100%; height:170px; object-fit:cover; display:block; }
  .badge{
    position:absolute;
    top:10px; left:10px;
    display:inline-flex;
    align-items:center;
    padding:3px 14px;
    border-radius:999px;
    background:var(--surface);
    border:1.5px solid var(--gold);
    box-shadow:0 0 0 3px var(--surface), 0 0 0 4.5px var(--gold-soft);
    font-weight:800;
    font-size:.78rem;
    color:var(--pink-deep);
  }
  .card-body{ padding:12px 14px 16px; }
  .card-chips{ display:flex; flex-wrap:wrap; gap:5px; }
  .card-chip{
    font-size:.68rem;
    font-weight:700;
    padding:2px 10px;
    border-radius:999px;
    background:var(--bg);
    color:var(--ink-muted);
  }
  .card-chip.empty{ font-style:italic; }

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--ink-muted);
  }
  .empty-state .big{
    font-family:'Shippori Mincho', serif;
    font-size:1.3rem;
    color:var(--pink-deep);
    display:block;
    margin-bottom:8px;
  }

  footer{
    text-align:center;
    padding:36px 24px 60px;
    color:var(--ink-muted);
    font-size:.78rem;
  }
  footer a{ color:var(--pink-deep); }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; scroll-behavior:auto !important; }
  }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2603828659978843"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
  <div class="eyebrow">UNOFFICIAL FAN INDEX</div>
  <h1>マギア☆エトセトラ 検索アーカイブ</h1>
  <p class="sub">「魔法少女まどか☆マギカ Magia Exedra」公式4コマ、全<span id="total-count">94</span>話をキャラクター名で検索できます。</p>
  <a class="official-link" href="https://madoka-exedra.com/comic/" target="_blank" rel="noopener">公式サイトで読む ↗</a>
</header>

<main>
  <section class="search-panel">
    <div class="search-box">
      <label for="search" class="sr-only">キャラクターを探す</label>
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search" placeholder="キャラクター名を検索して下から選択" autocomplete="off">
    </div>
    <div class="chips" id="chips" aria-label="キャラクターで絞り込み"></div>
    <p class="hint" id="hint"></p>
  </section>

  <p class="result-count" id="result-count"></p>

  <section class="grid" id="grid" aria-live="polite"></section>
</main>

<footer>
  このサイトは非公式のファン制作物です。画像・作品の著作権は©Magica Quartet/Aniplex, Magia Exedra Projectに帰属します。<br>
  登場キャラクターのデータは手動で作成しており、順次追加中です。
  <hr>
  <small><a href="https://elnlen.github.io/about/contact.html">お問い合わせ</a><br><a href="https://elnlen.github.io/about/privacypolicy.html">プライバシーポリシー</a></small>
</footer>

<script>
(function(){
  let allEpisodes = [];
  let allCharacters = [];
  let selected = new Set();
  let chipQuery = '';

  const els = {
    search: document.getElementById('search'),
    chips: document.getElementById('chips'),
    hint: document.getElementById('hint'),
    grid: document.getElementById('grid'),
    resultCount: document.getElementById('result-count'),
    totalCount: document.getElementById('total-count'),
  };

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(s){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s];
    });
  }

  function pad(n){ return String(n).padStart(2,'0'); }

  async function init(){
    let res;
    try {
      res = await fetch('./episodes.json');
    } catch(err){
      els.grid.innerHTML =
        '<div class="empty-state"><span class="big">読み込みエラー</span>' +
        'episodes.json にアクセスできませんでした。file:// で直接開くとブロックされることがあります。' +
        'ローカルで確認する場合は簡易サーバー経由（例: <code>python3 -m http.server</code>）で開くか、GitHub Pages上でご確認ください。</div>';
      return;
    }
    if(!res.ok){
      els.grid.innerHTML =
        '<div class="empty-state"><span class="big">読み込みエラー（HTTP ' + res.status + '）</span>' +
        'episodes.json が見つかりませんでした。index.html と同じ場所に置かれているか、ファイル名を確認してください。</div>';
      return;
    }
    try {
      allEpisodes = await res.json();
    } catch(err){
      els.grid.innerHTML =
        '<div class="empty-state"><span class="big">JSONの構文エラー</span>' +
        'episodes.json の中身が壊れています（カンマの重複・閉じ忘れなど）。ブラウザの詳細:<br>' +
        '<code>' + escapeHtml(err.message) + '</code></div>';
      return;
    }

    allEpisodes.sort(function(a,b){ return b.number - a.number; });
    els.totalCount.textContent = allEpisodes.length;

    const charSet = new Set();
    allEpisodes.forEach(function(ep){
      (ep.characters || []).forEach(function(c){ charSet.add(c); });
    });
    allCharacters = Array.from(charSet).sort(function(a,b){ return a.localeCompare(b, 'ja'); });

    renderChips();
    updateResults();

    els.search.addEventListener('input', function(e){
      chipQuery = e.target.value;
      renderChips();
    });
  }

  function toggleCharacter(name){
    if(name === ''){
      selected.clear();
    } else if(selected.has(name)){
      selected.delete(name);
    } else {
      selected.add(name);
    }
    renderChips();
    updateResults();
  }

  function renderChips(){
    const q = chipQuery.trim();

    const visible = allCharacters.filter(function(name){
      return selected.has(name) || !q || name.includes(q);
    });
    visible.sort(function(a, b){
      const aSel = selected.has(a) ? 0 : 1;
      const bSel = selected.has(b) ? 0 : 1;
      if(aSel !== bSel) return aSel - bSel;
      return a.localeCompare(b, 'ja');
    });

    let html = '<button class="chip' + (selected.size === 0 ? ' active' : '') + '" data-name="">すべて表示</button>';
    html += visible.map(function(name){
      const active = selected.has(name) ? ' active' : '';
      return '<button class="chip' + active + '" data-name="' + escapeHtml(name) + '">' + escapeHtml(name) + '</button>';
    }).join('');
    els.chips.innerHTML = html;

    els.chips.querySelectorAll('.chip').forEach(function(btn){
      btn.addEventListener('click', function(){ toggleCharacter(btn.dataset.name); });
    });

    els.hint.innerHTML = selected.size > 1
      ? '<strong>' + selected.size + '人</strong>選択中：すべて登場する回だけを表示しています（AND検索）'
      : '複数タップで絞り込み（選択した全キャラが登場する回だけを表示）';
  }

  function updateResults(){
    const names = Array.from(selected);
    const filtered = names.length === 0
      ? allEpisodes
      : allEpisodes.filter(function(ep){
          const chars = ep.characters || [];
          return names.every(function(n){ return chars.includes(n); });
        });

    renderGrid(filtered);

    els.resultCount.innerHTML = names.length === 0
      ? '全 <strong>' + allEpisodes.length + '</strong> 話を表示中'
      : '<strong>' + filtered.length + '</strong> / ' + allEpisodes.length + ' 話が「' +
        names.map(escapeHtml).join('」「') + '」' + (names.length > 1 ? '全員' : '') + 'に該当';
  }

  function renderGrid(episodes){
    if(episodes.length === 0){
      els.grid.innerHTML = '<div class="empty-state"><span class="big">見つかりませんでした</span>組み合わせを変えて試してみてください。</div>';
      return;
    }
    els.grid.innerHTML = episodes.map(function(ep){
      const chips = (ep.characters && ep.characters.length)
        ? ep.characters.map(function(c){ return '<span class="card-chip">' + escapeHtml(c) + '</span>'; }).join('')
        : '<span class="card-chip empty">未登録</span>';
      return (
        '<a class="card" href="' + ep.link + '" target="_blank" rel="noopener">' +
          '<div class="thumb-wrap">' +
            '<img src="' + ep.thumbnail + '" alt="第' + ep.number + '話" loading="lazy">' +
            '<span class="badge">#' + pad(ep.number) + '</span>' +
          '</div>' +
          '<div class="card-body"><div class="card-chips">' + chips + '</div></div>' +
        '</a>'
      );
    }).join('');
  }

  init();
})();
</script>

</body>
</html>
